<!DOCTYPE html>

    <link rel="icon" type="image/png" href="assets/img/logo.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"

    <link rel="stylesheet" href="assets/css/styles.css" />

  <body>
    <header class="header" id="header">
      <nav class="nav container">
        <a href="#" class="nav__logo"
          ><img src="assets/img/logo.png" alt="" />Fee Rainbow</a
        >

        <div class="nav__menu" id="nav-menu">
          <ul class="nav__list">
            <li>
              <a href="#" class="nav__link">Home</a>

            <li>
              <a

          <!-- Close Button -->
          <div class="nav__close" id="nav-close">
            <i class="ri-close-large-line"></i>
          </div>

        <!-- Close Button -->
        <div class="nav__toggle" id="nav-toggle">
          <i class="ri-menu-line"></i>

    <main class="main">

      <section class="product section" id="product">

          <button value="all" class="filter__button">Semua Produk</button>
          <button value="promo" class="filter__button">Produk Promo</button>
          <button value="makanan" class="filter__button">Parcel Makanan</button>
          <button value="keramik" class="filter__button">Parcel Keramik</button>
          <button value="mix" class="filter__button">Makanan + Keramik</button>
        </div>
        <div class="product__container container grid" id="productContainer">
          <article>
            <!-- Produk akan dirender dari JS -->
          </article>
        </div>
      </section>
    </main>

    <!--==================== FOOTER ====================-->
    <footer class="footer">
      <div class="footer__container container grid">
        <div>
          <a href="#" class="footer__logo"
            ><img src="assets/img/logo.png" alt="" />Fee Rainbow</a
          >
          <p class="footer__description">
            Menjual parcel & hampers premium untuk berbagai acara.
          </p>
        </div>
        <div class="footer__content grid">
          <div>

              <li>

            </ul>
          </div>
          <div>

            <ul class="footer__list">
              <li>
                <address class="footer__info">+62895602592430</address>
              </li>
            </ul>
          </div>
          <div>
            <h3 class="footer__title">Follow Us</h3>
            <div class="footer__social">
              <a href="">
                <a href="#">
                  <i class="ri-instagram-line"></i>
                </a>
              </a>
            </div>
          </div>
        </div>
      </div>
      <span class="footer__copy">
        &#169; All Rights Reserved By Fee Rainbow
      </span>
    </footer>

    <a href="#" class="scrollup" id="scroll-up">
      <i class="ri-arrow-up-line"></i>

    <script src="assets/js/data.js"></script>
